<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js01</title>
    <meta author="Miki">
</head>
<body>
    <script type="text/javascript" language="javascript">

        // declaració de variables
        var nom;
        var cognom;

        // valor a les variables
        nom="Miki";
        cognom="Jané";

        // sortida de les dades a la consola
        console.log(nom+" "+cognom);

        // sortida de dades ( strings )
        document.write("L'alumne es diu "+nom+" "+cognom+"</br>");
        
        // declarem i donem valor a la vegada
        var nom="Maik";
        var cognom="Jain";
        document.write("L'alumne es diu "+nom+" "+cognom+"</br>");

        // treballem amb variables numèriques
        var preu=10;
        var iva=1;
        document.write("El preu del formatge és "+(preu+iva)+"€</br>");
        var cost=preu+iva;
        document.write("El preu del formatge és "+cost+"€</br>");

    </script>
</body>
</html>
